<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💡 포인트 프로그램 아이디어 보드</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=Noto+Sans+KR:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { min-height: 100vh; background: #080c14; color: #e2e8f0; font-family: 'DM Sans', 'Noto Sans KR', sans-serif; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #0f172a; }
  ::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
  .header { border-bottom: 1px solid #1e293b; padding: 0 32px; }
  .header-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 64px; }
  .logo { width: 32px; height: 32px; background: linear-gradient(135deg, #38bdf8, #818cf8); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .refresh-btn { background: transparent; border: 1px solid #1e293b; color: #64748b; border-radius: 10px; padding: 8px 16px; font-size: 12px; cursor: pointer; font-family: inherit; transition: all 0.15s; display: flex; align-items: center; gap: 6px; }
  .refresh-btn:hover { border-color: #334155; color: #cbd5e1; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { display: inline-block; animation: spin 1s linear infinite; }
  .filter-btn { background: transparent; border: 1px solid #1e293b; color: #64748b; border-radius: 99px; padding: 6px 16px; font-size: 12px; cursor: pointer; transition: all 0.15s; font-family: inherit; }
  .filter-btn.active { background: #e2e8f0; border-color: #e2e8f0; color: #080c14; font-weight: 600; }
  .filter-btn:hover:not(.active) { border-color: #334155; color: #cbd5e1; }
  .like-btn { display: flex; align-items: center; gap: 6px; background: transparent; border: 1px solid #1e293b; color: #64748b; border-radius: 99px; padding: 6px 14px; font-size: 12px; cursor: pointer; transition: all 0.15s; font-family: inherit; }
  .like-btn.liked { background: #1e1b2e; border-color: #7c3aed; color: #a78bfa; }
  .like-btn:hover:not(.liked) { border-color: #334155; color: #94a3b8; }
  .input { background: #0f172a; border: 1px solid #1e293b; color: #e2e8f0; border-radius: 10px; padding: 10px 14px; font-size: 13px; font-family: inherit; width: 100%; outline: none; transition: border 0.15s; }
  .input:focus { border-color: #475569; }
  .input::placeholder { color: #334155; }
  select.input { appearance: none; cursor: pointer; }
  .main { max-width: 1200px; margin: 0 auto; padding: 32px; }
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 32px; }
  .stat-card { background: #0f172a; border: 1px solid #1e293b; border-radius: 14px; padding: 20px 24px; display: flex; justify-content: space-between; align-items: flex-start; }
  .stat-label { font-size: 11px; color: #475569; margin-bottom: 8px; letter-spacing: 0.06em; text-transform: uppercase; }
  .stat-value { font-size: 32px; font-weight: 700; font-family: 'Space Mono', monospace; }
  .filter-bar { background: #0f172a; border: 1px solid #1e293b; border-radius: 16px; padding: 20px 24px; margin-bottom: 24px; display: flex; flex-wrap: wrap; gap: 16px; align-items: center; }
  .filter-group { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .filter-label { font-size: 11px; color: #475569; letter-spacing: 0.05em; text-transform: uppercase; margin-right: 4px; }
  .divider { width: 1px; height: 20px; background: #1e293b; }
  .filter-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }
  /* 카드 */
  .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
  .card { background: #0f172a; border: 1px solid #1e293b; border-radius: 16px; padding: 24px; cursor: pointer; transition: border 0.2s, box-shadow 0.2s, transform 0.2s; animation: fadeUp 0.4s ease forwards; opacity: 0; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
  .card:hover { border-color: #334155; transform: translateY(-3px); box-shadow: 0 16px 48px rgba(0,0,0,0.5); }
  .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
  .tag { display: inline-block; padding: 3px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; gap: 8px; }
  .card-title { font-size: 15px; font-weight: 700; margin-bottom: 10px; line-height: 1.45; color: #f1f5f9; }
  .card-desc { font-size: 12px; color: #64748b; line-height: 1.75; margin-bottom: 16px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .card-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #1e293b; padding-top: 14px; }
  .card-info { font-size: 11px; color: #334155; }
  .card-author { color: #475569; font-weight: 500; }
  .status-badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 99px; font-size: 11px; font-weight: 500; white-space: nowrap; }
  /* 힌트 */
  .card-hint { font-size: 10px; color: #334155; text-align: center; margin-top: 8px; letter-spacing: 0.03em; }
  /* 상세 팝업 */
  .detail-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(6px); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
  .detail-bg.show { opacity: 1; pointer-events: all; }
  .detail-modal { background: #0f172a; border: 1px solid #1e293b; border-radius: 20px; width: 100%; max-width: 580px; max-height: 88vh; overflow-y: auto; transform: translateY(16px); transition: transform 0.25s; }
  .detail-bg.show .detail-modal { transform: translateY(0); }
  .detail-header { padding: 24px 28px 0; display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
  .detail-close { background: none; border: 1px solid #1e293b; color: #475569; border-radius: 8px; width: 32px; height: 32px; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0; }
  .detail-close:hover { border-color: #334155; color: #e2e8f0; }
  .detail-body { padding: 16px 28px 28px; }
  .detail-title { font-size: 18px; font-weight: 700; color: #f1f5f9; line-height: 1.4; margin-bottom: 20px; }
  .detail-section-label { font-size: 10px; color: #475569; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; }
  .detail-desc { font-size: 13px; color: #94a3b8; line-height: 1.85; margin-bottom: 24px; white-space: pre-wrap; background: #080c14; border: 1px solid #1e293b; border-radius: 10px; padding: 16px; }
  .detail-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .detail-info-item { background: #080c14; border: 1px solid #1e293b; border-radius: 10px; padding: 12px 14px; }
  .detail-info-label { font-size: 10px; color: #475569; letter-spacing: 0.05em; margin-bottom: 5px; text-transform: uppercase; }
  .detail-info-val { font-size: 13px; color: #e2e8f0; word-break: break-all; }
  .detail-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #1e293b; padding-top: 16px; }
  /* 기타 */
  .loading-wrap { grid-column: 1/-1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 0; gap: 16px; color: #475569; }
  .spinner { width: 36px; height: 36px; border: 3px solid #1e293b; border-top-color: #38bdf8; border-radius: 50%; animation: spin 0.8s linear infinite; }
  .error-wrap { grid-column: 1/-1; background: #1f1315; border: 1px solid rgba(239,68,68,0.3); border-radius: 14px; padding: 32px; text-align: center; color: #f87171; }
  .empty { grid-column: 1/-1; text-align: center; padding: 60px 0; color: #334155; }
  .empty-icon { font-size: 32px; margin-bottom: 12px; }
  .last-updated { font-size: 11px; color: #334155; margin-bottom: 16px; text-align: right; }
  .notice { background: #0f1a2e; border: 1px solid #1e3a5f; border-radius: 12px; padding: 14px 20px; margin-bottom: 24px; display: flex; align-items: flex-start; gap: 12px; font-size: 12px; color: #64748b; line-height: 1.6; }
  .notice strong { color: #38bdf8; }
  @media (max-width: 768px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .filter-right { margin-left: 0; width: 100%; }
    .main { padding: 16px; }
    .detail-info-grid { grid-template-columns: 1fr; }
    .detail-body { padding: 16px 20px 24px; }
    .detail-header { padding: 20px 20px 0; }
  }
</style>
</head>
<body>

<!-- 상세 팝업 -->
<div class="detail-bg" id="detailBg" onclick="if(event.target===this)closeDetail()">
  <div class="detail-modal" id="detailModal"></div>
</div>

<div class="header">
  <div class="header-inner">
    <div style="display:flex;align-items:center;gap:12px;">
      <div class="logo">💡</div>
      <span style="font-weight:700;font-size:15px;letter-spacing:-0.01em;">아이디어 보드</span>
      <span style="color:#334155;font-size:13px;">· 포인트 프로그램 확장</span>
    </div>
    <button class="refresh-btn" id="refreshBtn" onclick="loadData()">
      <span id="refreshIcon">🔄</span> 새로고침
    </button>
  </div>
</div>

<div class="main">
  <div class="notice">
    <span style="font-size:18px;flex-shrink:0;">📌</span>
    <div>
      <strong>구글 폼으로 제출된 아이디어가 자동으로 표시됩니다.</strong><br>
      카드를 클릭하면 상세 내용을 볼 수 있어요. 새로운 제출이 있으면 우측 상단 새로고침 버튼을 눌러주세요.
    </div>
  </div>

  <div class="stats-grid" id="statsGrid">
    <div class="stat-card"><div><div class="stat-label">전체 아이디어</div><div class="stat-value" style="color:#38bdf8">-</div></div><span style="font-size:22px">📋</span></div>
    <div class="stat-card"><div><div class="stat-label">채택된 아이디어</div><div class="stat-value" style="color:#4ade80">-</div></div><span style="font-size:22px">✅</span></div>
    <div class="stat-card"><div><div class="stat-label">검토 중</div><div class="stat-value" style="color:#facc15">-</div></div><span style="font-size:22px">🔍</span></div>
    <div class="stat-card"><div><div class="stat-label">최고 좋아요</div><div class="stat-value" style="color:#a78bfa">-</div></div><span style="font-size:22px">👍</span></div>
  </div>

  <div class="filter-bar">
    <div class="filter-group">
      <span class="filter-label">직종</span>
      <div id="jobFilters" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
    </div>
    <div class="divider"></div>
    <div class="filter-group">
      <span class="filter-label">연령대</span>
      <div id="ageFilters" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
    </div>
    <div class="divider"></div>
    <div class="filter-group">
      <span class="filter-label">활용방향</span>
      <div id="directionFilters" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
    </div>
    <div class="divider"></div>
    <div class="filter-group">
      <span class="filter-label">상태</span>
      <div id="statusFilters" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
    </div>
    <div class="filter-right">
      <input class="input" style="width:200px" placeholder="제목 / 이름 / 부서 검색..." id="searchInput" oninput="render()">
      <select class="input" style="width:110px" id="sortSelect" onchange="render()">
        <option>최신순</option>
        <option>인기순</option>
      </select>
    </div>
  </div>

  <div id="lastUpdated" class="last-updated"></div>
  <div class="cards-grid" id="cardsGrid">
    <div class="loading-wrap"><div class="spinner"></div><div>데이터를 불러오는 중...</div></div>
  </div>
</div>

<script>
var API_URL = 'https://script.google.com/macros/s/AKfycbzJ8QAz8FTfeyallF0rj_deKR6pPwwukktclJT2Cx92OK591vvsVFW4rYzMj_BatIw/exec';

var ideas = [];
var liked = {};
var activeJob = '전체';
var activeAge = '전체';
var activeDirection = '전체';
var activeStatus = '전체';

var JOBS = ['전체','의사 (병원)','의사 (로컬)','약사 (개국약사)','약사 (근무약사)','의사/약사 공통'];
var AGES = ['전체','20~30대','40~50대','60대 이상'];
var DIRECTIONS = ['전체','포인트 사용 활성화','포인트 첫 경험 유도','VIP 고액 보유자 전용','전체'];
var STATUSES = ['전체','접수','검토중','채택','보류'];
var STATUS_STYLE = {
  '접수':   { bg:'#1e293b', color:'#94a3b8', dot:'#475569' },
  '검토중': { bg:'#1c1a0e', color:'#facc15', dot:'#eab308' },
  '채택':   { bg:'#052e16', color:'#4ade80', dot:'#22c55e' },
  '보류':   { bg:'#1f1315', color:'#f87171', dot:'#ef4444' },
};
var TARGET_COLOR = {
  '의사':  { bg:'#0f1a2e', color:'#38bdf8', border:'#1e3a5f' },
  '약사':  { bg:'#1a0f2e', color:'#a78bfa', border:'#3a1e5f' },
  '둘 다': { bg:'#0f2e1a', color:'#4ade80', border:'#1e5f3a' },
};

function normalizeTarget(v) {
  if (!v) return '둘 다';
  var s = String(v).trim();
  if (s.indexOf('의사') === 0) return '의사';
  if (s.indexOf('약사') === 0) return '약사';
  if (s.indexOf('둘') >= 0 || s.indexOf('모두') >= 0) return '둘 다';
  return '둘 다';
}

function loadData() {
  var icon = document.getElementById('refreshIcon');
  icon.className = 'spin';
  document.getElementById('cardsGrid').innerHTML =
    '<div class="loading-wrap"><div class="spinner"></div><div>데이터를 불러오는 중...</div></div>';

  var callbackName = 'cb_' + Date.now();
  var script = document.createElement('script');

  var timer = setTimeout(function() {
    if (window[callbackName]) {
      delete window[callbackName];
      if (script.parentNode) document.body.removeChild(script);
      icon.className = '';
      showError();
    }
  }, 8000);

  window[callbackName] = function(data) {
    clearTimeout(timer);
    icon.className = '';
    delete window[callbackName];
    if (script.parentNode) document.body.removeChild(script);

    if (!data || !Array.isArray(data)) { showError(); return; }

    ideas = data.filter(function(r) {
      return r[1] && (r[8] || r[5]);
    }).map(function(r, idx) {
      // 새 폼(연령대/진료과/활용방향 있음): r[8]이 제목
      // 구 폼(연령대/진료과/활용방향 없음): r[5]가 제목
      var isNewForm = String(r[5]||'').trim() !== '' && 
                      (String(r[5]||'').trim().match(/대$/) || 
                       String(r[5]||'').trim() === '전 연령');
      var title     = isNewForm ? String(r[8]||'').trim()  : String(r[5]||'').trim();
      var desc      = isNewForm ? String(r[9]||'').trim()  : String(r[6]||'').trim();
      var partner   = isNewForm ? String(r[10]||'').trim() : String(r[7]||'').trim();
      var ref       = isNewForm ? String(r[11]||'').trim() : String(r[8]||'').trim();
      var status    = isNewForm ? (String(r[12]||'').trim() || '접수') : (String(r[9]||'').trim() || '접수');
      var memo      = isNewForm ? String(r[13]||'').trim() : String(r[10]||'').trim();
      return {
        id:        idx + 1,
        timestamp: String(r[0]||'').trim(),
        name:      String(r[1]||'').trim(),
        dept:      String(r[2]||'').trim(),
        email:     String(r[3]||'').trim(),
        job:       String(r[4]||'').trim(),
        age:       isNewForm ? String(r[5]||'').trim() : '',
        specialty: isNewForm ? String(r[6]||'').trim() : '',
        direction: isNewForm ? String(r[7]||'').trim() : '',
        title:     title,
        desc:      desc,
        partner:   partner,
        ref:       ref,
        status:    status,
        memo:      memo,
        likes:     liked[idx+1] || 0,
      };
    });

    var now = new Date();
    document.getElementById('lastUpdated').textContent =
      '마지막 업데이트: ' + now.getFullYear() + '.' +
      String(now.getMonth()+1).padStart(2,'0') + '.' +
      String(now.getDate()).padStart(2,'0') + ' ' +
      String(now.getHours()).padStart(2,'0') + ':' +
      String(now.getMinutes()).padStart(2,'0');

    render();
  };

  script.onerror = function() {
    clearTimeout(timer);
    icon.className = '';
    delete window[callbackName];
    showError();
  };

  script.src = API_URL + '?callback=' + callbackName;
  document.body.appendChild(script);
}

function showError() {
  document.getElementById('cardsGrid').innerHTML =
    '<div class="error-wrap">' +
      '<div style="font-size:28px;margin-bottom:12px">⚠️</div>' +
      '<div style="font-weight:700;margin-bottom:10px;">데이터를 불러오지 못했습니다</div>' +
      '<div style="font-size:12px;color:#94a3b8;margin-bottom:16px;">인터넷 연결 상태를 확인하고 다시 시도해주세요.</div>' +
      '<button class="refresh-btn" onclick="loadData()" style="margin:0 auto;">🔄 다시 시도</button>' +
    '</div>';
}

function setJob(v) { activeJob = v; render(); }
function setAge(v) { activeAge = v; render(); }
function setDirection(v) { activeDirection = v; render(); }
function setStatus(v) { activeStatus = v; render(); }

function render() {
  document.getElementById('jobFilters').innerHTML = JOBS.map(function(t) {
    return '<button class="filter-btn ' + (activeJob===t?'active':'') + '" onclick="setJob(\'' + t + '\')">' + t + '</button>';
  }).join('');
  document.getElementById('ageFilters').innerHTML = AGES.map(function(t) {
    return '<button class="filter-btn ' + (activeAge===t?'active':'') + '" onclick="setAge(\'' + t + '\')">' + t + '</button>';
  }).join('');
  document.getElementById('directionFilters').innerHTML = DIRECTIONS.map(function(t) {
    return '<button class="filter-btn ' + (activeDirection===t?'active':'') + '" onclick="setDirection(\'' + t + '\')">' + t + '</button>';
  }).join('');
  document.getElementById('statusFilters').innerHTML = STATUSES.map(function(s) {
    return '<button class="filter-btn ' + (activeStatus===s?'active':'') + '" onclick="setStatus(\'' + s + '\')">' + s + '</button>';
  }).join('');

  var search = document.getElementById('searchInput').value.trim();
  var sort   = document.getElementById('sortSelect').value;

  var filtered = ideas.filter(function(i) {
    return (activeJob === '전체' || i.job === activeJob) &&
           (activeAge === '전체' || i.age === activeAge) &&
           (activeDirection === '전체' || i.direction === activeDirection) &&
           (activeStatus === '전체' || i.status === activeStatus) &&
           (!search || i.title.indexOf(search) >= 0 || i.name.indexOf(search) >= 0 || i.dept.indexOf(search) >= 0);
  }).slice().sort(function(a, b) {
    return sort === '인기순' ? b.likes - a.likes : b.id - a.id;
  });

  document.getElementById('statsGrid').innerHTML = [
    { label:'전체 아이디어',   value: ideas.length, accent:'#38bdf8', icon:'📋' },
    { label:'채택된 아이디어', value: ideas.filter(function(i){return i.status==='채택';}).length, accent:'#4ade80', icon:'✅' },
    { label:'검토 중',         value: ideas.filter(function(i){return i.status==='검토중';}).length, accent:'#facc15', icon:'🔍' },
    { label:'최고 좋아요',     value: ideas.length ? Math.max.apply(null, ideas.map(function(i){return i.likes;})) : 0, accent:'#a78bfa', icon:'👍' },
  ].map(function(s) {
    return '<div class="stat-card"><div><div class="stat-label">' + s.label + '</div><div class="stat-value" style="color:' + s.accent + '">' + s.value + '</div></div><span style="font-size:22px">' + s.icon + '</span></div>';
  }).join('');

  if (!filtered.length) {
    document.getElementById('cardsGrid').innerHTML = ideas.length === 0
      ? '<div class="empty"><div class="empty-icon">📭</div><div style="margin-bottom:8px">아직 제출된 아이디어가 없습니다</div><div style="font-size:12px;color:#475569">구글 폼으로 첫 번째 아이디어를 제출해보세요!</div></div>'
      : '<div class="empty"><div class="empty-icon">🔍</div><div>조건에 맞는 아이디어가 없습니다</div></div>';
    return;
  }

  document.getElementById('cardsGrid').innerHTML = filtered.map(function(idea, idx) {
    var ss = STATUS_STYLE[idea.status] || STATUS_STYLE['접수'];
    var tc = TARGET_COLOR[idea.target] || TARGET_COLOR['둘 다'];
    var isLiked = liked[idea.id];
    var previewDesc = idea.desc ? idea.desc : '';

    return (
      '<div class="card" style="animation-delay:' + (idx*40) + 'ms" onclick="openDetail(' + idea.id + ')">' +
        '<div class="card-top">' +
          '<span class="tag" style="background:' + tc.bg + ';color:' + tc.color + ';border:1px solid ' + tc.border + '">▸ ' + idea.target + '</span>' +
          '<span class="status-badge" style="background:' + ss.bg + ';color:' + ss.color + '"><span class="dot" style="background:' + ss.dot + '"></span>' + idea.status + '</span>' +
        '</div>' +
        '<div class="card-title">' + idea.title + '</div>' +
        '<div class="card-desc">' + (previewDesc || '<span style="color:#334155">클릭해서 내용 보기</span>') + '</div>' +
        '<div class="card-footer">' +
          '<div class="card-info"><span class="card-author">' + idea.name + '</span> · ' + (idea.dept||'') + '</div>' +
          '<button class="like-btn ' + (isLiked?'liked':'') + '" onclick="event.stopPropagation();toggleLike(' + idea.id + ')">👍 <span style="font-family:\'Space Mono\',monospace;font-size:11px">' + idea.likes + '</span></button>' +
        '</div>' +
        '<div class="card-hint">클릭해서 상세보기 →</div>' +
      '</div>'
    );
  }).join('');
}

function openDetail(id) {
  var idea = ideas.find(function(i) { return i.id === id; });
  if (!idea) return;
  var ss = STATUS_STYLE[idea.status] || STATUS_STYLE['접수'];
  var tc = TARGET_COLOR[idea.target] || TARGET_COLOR['둘 다'];
  var isLiked = liked[idea.id];
  var partnerHtml = idea.partner
    ? '<div class="detail-info-item"><div class="detail-info-label">예상 협력사</div><div class="detail-info-val">' + idea.partner + '</div></div>' : '';
  var refHtml = idea.ref
    ? '<div class="detail-info-item"><div class="detail-info-label">참고자료</div><div class="detail-info-val"><a style="color:#38bdf8;text-decoration:none;word-break:break-all" href="' + idea.ref + '" target="_blank" onclick="event.stopPropagation()">' + idea.ref + '</a></div></div>' : '';
  var memoHtml = idea.memo
    ? '<div style="padding:14px 16px;background:#080c14;border-radius:10px;border-left:3px solid #facc15;font-size:12px;color:#94a3b8;margin-bottom:20px"><span style="color:#facc15;font-weight:600;display:block;margin-bottom:4px">담당자 메모</span>' + idea.memo + '</div>' : '';

  document.getElementById('detailModal').innerHTML =
    '<div class="detail-header">' +
      '<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">' +
        '<span class="tag" style="background:' + tc.bg + ';color:' + tc.color + ';border:1px solid ' + tc.border + '">▸ ' + idea.target + '</span>' +
        '<span class="status-badge" style="background:' + ss.bg + ';color:' + ss.color + '"><span class="dot" style="background:' + ss.dot + '"></span>' + idea.status + '</span>' +
      '</div>' +
      '<button class="detail-close" onclick="closeDetail()">✕</button>' +
    '</div>' +
    '<div class="detail-body">' +
      '<div class="detail-title">' + idea.title + '</div>' +
      '<div class="detail-section-label">아이디어 상세 설명</div>' +
      '<div class="detail-desc">' + (idea.desc || '상세 설명이 없습니다.') + '</div>' +
      memoHtml +
      '<div class="detail-section-label">제출자 정보</div>' +
      '<div class="detail-info-grid">' +
        '<div class="detail-info-item"><div class="detail-info-label">성명</div><div class="detail-info-val">' + idea.name + '</div></div>' +
        '<div class="detail-info-item"><div class="detail-info-label">소속부서</div><div class="detail-info-val">' + (idea.dept||'-') + '</div></div>' +
        '<div class="detail-info-item"><div class="detail-info-label">연락처</div><div class="detail-info-val">' + (idea.email||'-') + '</div></div>' +
        '<div class="detail-info-item"><div class="detail-info-label">직종</div><div class="detail-info-val">' + (idea.job||'-') + '</div></div>' +
        '<div class="detail-info-item"><div class="detail-info-label">연령대</div><div class="detail-info-val">' + (idea.age||'-') + '</div></div>' +
        '<div class="detail-info-item"><div class="detail-info-label">진료과/분야</div><div class="detail-info-val">' + (idea.specialty||'-') + '</div></div>' +
        '<div class="detail-info-item"><div class="detail-info-label">포인트 활용방향</div><div class="detail-info-val">' + (idea.direction||'-') + '</div></div>' +
        '<div class="detail-info-item"><div class="detail-info-label">제출일시</div><div class="detail-info-val">' + idea.timestamp.slice(0,16) + '</div></div>' +
        partnerHtml + refHtml +
      '</div>' +
      '<div class="detail-footer">' +
        '<div style="font-size:12px;color:#475569">좋은 아이디어라면 👍 눌러주세요!</div>' +
        '<button class="like-btn ' + (isLiked?'liked':'') + '" id="dlb_' + idea.id + '" onclick="toggleLike(' + idea.id + ')">👍 <span id="dlc_' + idea.id + '" style="font-family:\'Space Mono\',monospace;font-size:11px">' + idea.likes + '</span></button>' +
      '</div>' +
    '</div>';

  document.getElementById('detailBg').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeDetail() {
  document.getElementById('detailBg').classList.remove('show');
  document.body.style.overflow = '';
}

function toggleLike(id) {
  if (liked[id]) return;
  liked[id] = true;
  ideas = ideas.map(function(i) {
    return i.id === id
      ? { id:i.id, timestamp:i.timestamp, name:i.name, dept:i.dept, email:i.email, job:i.job, age:i.age, specialty:i.specialty, direction:i.direction, title:i.title, desc:i.desc, partner:i.partner, ref:i.ref, status:i.status, memo:i.memo, likes:i.likes+1 }
      : i;
  });
  // 팝업 안 좋아요 버튼도 업데이트
  var dlb = document.getElementById('dlb_' + id);
  var dlc = document.getElementById('dlc_' + id);
  if (dlb) dlb.classList.add('liked');
  if (dlc) { var found = ideas.find(function(i){return i.id===id;}); if(found) dlc.textContent = found.likes; }
  render();
}

// ESC 키로 팝업 닫기
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeDetail();
});

loadData();
</script>
</body>
</html>
